<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Antenna -->
  <rect x="7" y="0" width="2" height="1" fill="#1a7f37"/>
  <rect x="7" y="1" width="2" height="1" fill="#6e7781"/>
  <!-- Head -->
  <rect x="4" y="2" width="8" height="1" fill="#0969da"/>
  <rect x="3" y="3" width="10" height="1" fill="#0969da"/>
  <rect x="3" y="4" width="2" height="1" fill="#0969da"/>
  <rect x="6" y="4" width="4" height="1" fill="#0969da"/>
  <rect x="11" y="4" width="2" height="1" fill="#0969da"/>
  <!-- Eyes -->
  <rect x="5" y="4" width="1" height="1" fill="#ffffff"/>
  <rect x="10" y="4" width="1" height="1" fill="#ffffff"/>
  <!-- Head bottom -->
  <rect x="3" y="5" width="10" height="1" fill="#0969da"/>
  <rect x="5" y="5" width="6" height="1" fill="#539bf5"/>
  <rect x="4" y="6" width="8" height="1" fill="#0969da"/>
  <!-- Neck -->
  <rect x="6" y="7" width="4" height="1" fill="#6e7781"/>
  <!-- Body -->
  <rect x="4" y="8" width="8" height="1" fill="#0969da"/>
