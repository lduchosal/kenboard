  <!-- Body middle -->
  <rect x="3" y="10" width="10" height="1" fill="#0969da"/>
  <!-- Chest panel -->
  <rect x="5" y="9" width="2" height="2" fill="#1a7f37"/>
  <rect x="9" y="9" width="2" height="2" fill="#bf8700"/>
  <!-- Body bottom -->
  <rect x="3" y="11" width="10" height="1" fill="#0969da"/>
  <rect x="4" y="12" width="8" height="1" fill="#0969da"/>
  <!-- Legs -->
  <rect x="5" y="13" width="2" height="1" fill="#6e7781"/>
  <rect x="9" y="13" width="2" height="1" fill="#6e7781"/>
  <!-- Feet -->
  <rect x="4" y="14" width="3" height="1" fill="#0969da"/>
  <rect x="9" y="14" width="3" height="1" fill="#0969da"/>
  <rect x="3" y="15" width="4" height="1" fill="#0969da"/>
  <rect x="9" y="15" width="4" height="1" fill="#0969da"/>
</svg>
