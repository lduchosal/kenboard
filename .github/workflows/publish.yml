name: Publish Package

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 UTC
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: dashboard_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_TEST_NAME: dashboard_test
      DB_TEST_USER: dashboard_test
      DB_TEST_PASSWORD: testpass
      DB_TEST_MIGRATE_USER: dashboard_test_admin
      DB_TEST_MIGRATE_PASSWORD: testpass

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install PDM
      run: |
        python -m pip install --upgrade pip pdm
        pdm self add pdm-bump

    - name: Wait for MySQL & create test users
      run: |
        for i in {1..30}; do
          if mysqladmin ping -h 127.0.0.1 -uroot -prootpass --silent; then
            break
          fi
          sleep 2
        done
        mysql -h 127.0.0.1 -uroot -prootpass <<-SQL
          CREATE USER IF NOT EXISTS 'dashboard_test'@'%' IDENTIFIED BY 'testpass';
          CREATE USER IF NOT EXISTS 'dashboard_test_admin'@'%' IDENTIFIED BY 'testpass';
          GRANT ALL ON dashboard_test.* TO 'dashboard_test'@'%';
          GRANT ALL ON dashboard_test.* TO 'dashboard_test_admin'@'%';
          GRANT CREATE ON *.* TO 'dashboard_test_admin'@'%';
          FLUSH PRIVILEGES;
        SQL

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Publish
      run: sh publish.sh --ci --${{ inputs.bump_type || 'patch' }}
      env:
        PDM_PUBLISH_USERNAME: __token__
        PDM_PUBLISH_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        # publish.sh runs `gh release create` to attach the browser
        # extension zip (#501). The gh CLI authenticates from GH_TOKEN;
        # GitHub Actions does NOT auto-export the workflow token to step
        # processes, so without this line every CI/scheduled publish
        # produced a release-less tag and the extension never shipped.
        # The default token has contents:write (see permissions above).
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # publish.sh → scripts/sonar_gate.py reads SONAR_TOKEN from env.
        # GitHub Actions repository secrets are NOT auto-exposed to step
        # processes — they must be mapped explicitly via this env block.
        # Setting the secret in repo settings without this line silently
        # produced "Error: SONAR_TOKEN not found in env or .env" during
        # the Sonarcloud quality gate step (#346).
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
