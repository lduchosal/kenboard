<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>kenboard quick-task — Settings</title>
<style>
body { font-family: system-ui, -apple-system, sans-serif; max-width: 480px; margin: 24px auto; padding: 0 16px; color: #222; }
h1 { font-size: 18px; margin-bottom: 16px; }
form { display: flex; flex-direction: column; gap: 14px; }
label { display: flex; flex-direction: column; font-size: 12px; color: #57606a; gap: 4px; }
input { padding: 6px 8px; border: 1px solid #d0d7de; border-radius: 4px; font-size: 13px; box-sizing: border-box; font-family: inherit; }
.actions { display: flex; gap: 8px; align-items: center; }
button { padding: 6px 14px; background: #0969da; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; }
button.secondary { background: #f6f8fa; color: #222; border: 1px solid #d0d7de; font-weight: 400; }
button:hover:not(.secondary) { background: #0860c4; }
button.secondary:hover { background: #eaeef2; }
#status { font-size: 12px; min-height: 16px; color: #57606a; }
#status.success { color: #1a7f37; }
#status.error { color: #cf222e; }
small { color: #57606a; font-weight: 400; }
.ver { font-size: 11px; font-weight: 400; color: #57606a; }
</style>
</head>
<body>
<h1>kenboard quick-task — Settings <span id="ext-version" class="ver"></span></h1>
<form id="settings">
  <label>Onboarding link <small>(paste "Copy onboard link" from the kenboard — fills the fields below)</small>
    <input id="onboardLink" type="url" placeholder="https://…/onboard/cat/…/project/…?token=…" autocomplete="off">
  </label>
  <label>Base URL
    <input id="baseUrl" required placeholder="https://www.kenboard.2113.ch">
  </label>
  <label>API token <small>(from /admin/keys on the kenboard)</small>
    <input id="apiToken" required type="password" placeholder="kb_...">
  </label>
  <label>Project ID <small>(UUID of the target project)</small>
    <input id="projectId" required placeholder="76a70206-...">
  </label>
  <label>Default who <small>(prefills the "who" field in the popup)</small>
    <input id="defaultWho" placeholder="Q">
  </label>
  <div class="actions">
    <button type="submit">Save</button>
    <button type="button" class="secondary" id="test">Test connection</button>
  </div>
  <div id="status"></div>
</form>
<script src="options.js"></script>
</body>
</html>
