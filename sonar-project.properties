sonar.projectKey=lduchosal_kenboard
sonar.organization=lduchosal

sonar.sources=src
sonar.tests=tests
# JS tests live next to their modules under src/dashboard/static/js/ as
# ``*.test.js`` files (Vitest convention). Tell Sonar so they are scanned
# as tests, not as production code (otherwise their helpers trigger
# "move to outer scope" violations and they bloat the coverage denominator
# without contributing covered lines).
sonar.test.inclusions=tests/**,src/dashboard/static/js/**/*.test.js

sonar.python.version=3.11,3.12,3.13
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Drop noisy / non-owned code from the analysis surface.
# - vendored JS libs (sortable, marked, dompurify): not our code
# - migrations: schema-only, raw SQL with no logic to lint
# - pentest scripts: standalone security checks, not shipped
# - generated badge SVG
# - htmlcov / coverage / build artifacts
sonar.exclusions=src/dashboard/static/sortable.min.js,src/dashboard/static/marked.min.js,src/dashboard/static/dompurify.min.js,src/dashboard/migrations/**,pentest/**,interrogate_badge.svg,htmlcov/**,dist/**,build/**,**/__pycache__/**

# Coverage exclusions: tests + entry stubs (already mirrors pyproject.toml).
# - app.js: legacy monolith, no longer served (replaced by static/dist/app.js
#   from #251); kept temporarily to ease bisecting.
# - main.js: entry that just imports + wires globals; trivial.
# - dist/**: bundled output, instrumented coverage points to source modules.
# - categories.js / projects.js / tasks.js / dnd.js / fullscreen.js:
#   DOM-side-effect heavy (each save reloads the page), already covered
#   end-to-end by the Playwright suite under tests/e2e/. Adding JS unit
#   tests for these would duplicate that coverage with brittler glue.
# - *.test.js: test files themselves don't need coverage.
sonar.coverage.exclusions=tests/**,src/dashboard/__main__.py,src/dashboard/static/app.js,src/dashboard/static/js/**/*.test.js,src/dashboard/static/dist/**,src/dashboard/static/js/main.js,src/dashboard/static/js/categories.js,src/dashboard/static/js/projects.js,src/dashboard/static/js/tasks.js,src/dashboard/static/js/dnd.js,src/dashboard/static/js/fullscreen.js

# Targeted rule suppression: Web:S6819 ("use <button> instead of role=button")
# cannot be satisfied on the task card because its detail mode exposes a
# nested ``.btn-edit`` <button>. HTML5 forbids interactive descendants inside
# <button>, and browser parsers implicitly close the outer button on the
# inner <button> tag — which breaks layout and keyboard navigation. The
# ``role="button"`` pattern with explicit keyboard handling is the correct
# accessible composition here; see the NOSONAR-style comment in task_card.html.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=Web:S6819
sonar.issue.ignore.multicriteria.e1.resourceKey=src/dashboard/templates/partials/task_card.html
