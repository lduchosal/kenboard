sonar.projectKey=lduchosal_kenboard
sonar.organization=lduchosal

sonar.sources=src
sonar.tests=tests

sonar.python.version=3.11,3.12,3.13
sonar.python.coverage.reportPaths=coverage.xml

# Drop noisy / non-owned code from the analysis surface.
# - vendored JS libs (sortable, marked, dompurify): not our code
# - migrations: schema-only, raw SQL with no logic to lint
# - pentest scripts: standalone security checks, not shipped
# - generated badge SVG
# - htmlcov / coverage / build artifacts
sonar.exclusions=src/dashboard/static/sortable.min.js,src/dashboard/static/marked.min.js,src/dashboard/static/dompurify.min.js,src/dashboard/migrations/**,pentest/**,interrogate_badge.svg,htmlcov/**,dist/**,build/**,**/__pycache__/**

# Coverage exclusions: tests + entry stubs (already mirrors pyproject.toml).
# app.js has no JS-side coverage instrumentation — exclude so it doesn't drag
# the global coverage metric down.
sonar.coverage.exclusions=tests/**,src/dashboard/__main__.py,src/dashboard/static/app.js

# Targeted rule suppression: Web:S6819 ("use <button> instead of role=button")
# cannot be satisfied on the task card because its detail mode exposes a
# nested ``.btn-edit`` <button>. HTML5 forbids interactive descendants inside
# <button>, and browser parsers implicitly close the outer button on the
# inner <button> tag — which breaks layout and keyboard navigation. The
# ``role="button"`` pattern with explicit keyboard handling is the correct
# accessible composition here; see the NOSONAR-style comment in task_card.html.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=Web:S6819
sonar.issue.ignore.multicriteria.e1.resourceKey=src/dashboard/templates/partials/task_card.html
