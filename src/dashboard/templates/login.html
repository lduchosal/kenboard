<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kenboard &mdash; Connexion</title>
<link rel="stylesheet" href="/style.css">
</head>
<body class="login-body">
  <div class="login-card">
    <h1 class="login-title">KENBOARD</h1>
    <form method="post" action="/login" class="login-form" autocomplete="off">
      <input type="hidden" name="next" value="{{ next_url }}">
      <label class="login-label">
        Nom
        <input type="text" name="name" autofocus required autocomplete="username">
      </label>
      <label class="login-label">
        Mot de passe
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}
      <button type="submit" class="btn btn-save login-submit">Se connecter</button>
    </form>
  </div>
</body>
</html>
