<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kenboard &mdash; Connexion</title>
<link rel="icon" type="image/png" href="/static/favicon-32.png" sizes="32x32">
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="stylesheet" href="/style.css">
</head>
<body class="login-body">
  <div class="login-card login-card-split">
    <div class="login-logo-panel">
      <img src="/static/logo.svg" alt="Kenboard" class="login-logo">
    </div>
    <div class="login-form-panel">
      <h1 class="login-title">KENBOARD</h1>
      <form method="post" action="/login" class="login-form" autocomplete="off">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label class="login-label">
          Nom
          <input type="text" name="name" autofocus required autocomplete="username">
        </label>
        <label class="login-label">
          Mot de passe
          <input type="password" name="password" required autocomplete="current-password">
        </label>
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        {% if message %}
        <div class="login-success">{{ message }}</div>
        {% endif %}
        <button type="submit" class="btn btn-save login-submit">Se connecter</button>
      </form>
      <div style="text-align:center;margin-top:8px">
        <a href="/forgot-password" style="font-size:12px;color:var(--dimmed)">Mot de passe oubli&eacute; ?</a>
      </div>
      {% if config.get("REGISTER_ALLOWED_DOMAIN") %}
      <div style="text-align:center;margin-top:4px">
        <a href="/register" style="font-size:12px;color:var(--dimmed)">Cr&eacute;er un compte</a>
      </div>
      {% endif %}
      {% if config.get("OIDC_ENABLED") %}
      <div class="login-separator"><span>ou</span></div>
      <a href="/oidc/login" class="btn btn-save login-submit login-oidc-btn">Sign in with OIDC</a>
      {% endif %}
    </div>
  </div>
</body>
</html>
