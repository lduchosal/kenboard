<div class="fullscreen-modal" id="task-fullscreen" style="display:none" onclick="if(event.target===this)closeFullscreen()">
  <div class="fullscreen-card">
    <div class="fullscreen-header">
      <span class="fullscreen-id" id="fs-id"></span>
      <span class="fullscreen-status" id="fs-status"></span>
      <button class="modal-close" onclick="closeFullscreen()">&times;</button>
    </div>
    <h2 class="fullscreen-title" id="fs-title"></h2>
    <div class="fullscreen-meta">
      <div class="task-avatar" id="fs-avatar" style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700"></div>
      <span id="fs-who" style="font-weight:600"></span>
      <span id="fs-when" style="color:var(--dimmed)"></span>
    </div>
    <div class="fullscreen-desc" id="fs-desc"></div>
    <div class="fullscreen-actions">
      <button class="btn btn-save" id="fs-edit-btn">Editer</button>
      <button class="btn btn-cancel" onclick="closeFullscreen()">Fermer</button>
    </div>
  </div>
</div>
