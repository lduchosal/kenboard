<div class="project-add-modal" id="task-modal" style="display:none" onclick="this.style.display='none'">
  <div class="project-add-card" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="this.closest('.project-add-modal').style.display='none'">&times;</button>
    <h3 id="task-modal-heading">Nouvelle t&acirc;che</h3>
    <div class="edit-row"><input type="text" id="task-modal-title" placeholder="Titre" style="font-weight:600"></div>
    <div class="edit-row"><textarea id="task-modal-desc" placeholder="Detail"></textarea></div>
    <div class="edit-row">
      <select id="task-modal-who">
        {% for name in avatar_colors %}
        <option>{{ name }}</option>
        {% endfor %}
      </select>
      <input type="text" id="task-modal-when" placeholder="dd.mm" style="width:60px;flex:none">
      <select id="task-modal-status">
        {% for col in columns %}
        <option value="{{ col.id }}">{{ col.name }}</option>
        {% endfor %}
      </select>
    </div>
    <input type="hidden" id="task-modal-project-id">
    <div class="edit-actions">
      <button class="btn btn-save" onclick="saveTaskModal()">Enregistrer</button>
      <button class="btn btn-delete" id="task-modal-delete" style="display:none" onclick="confirmDelete(this, deleteTask)">Supprimer</button>
    </div>
  </div>
</div>
