<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kenboard &mdash; Mot de passe oubli&eacute;</title>
<link rel="icon" type="image/png" href="/static/favicon-32.png" sizes="32x32">
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="stylesheet" href="/style.css">
</head>
<body class="login-body">
  <div class="login-card login-card-split">
    <div class="login-logo-panel">
      <img src="/static/logo.svg" alt="Kenboard" class="login-logo">
    </div>
    <div class="login-form-panel">
      <h1 class="login-title">Mot de passe oubli&eacute;</h1>
      <p style="font-size:13px;color:var(--dimmed);margin:0 0 16px">Entrez votre adresse email. Si un compte existe, un lien de r&eacute;initialisation vous sera envoy&eacute;.</p>
      <form method="post" action="/forgot-password" class="login-form" autocomplete="off">
        <label class="login-label">
          Email
          <input type="email" name="email" autofocus required autocomplete="email">
        </label>
        {% if message %}
        <div class="{{ 'login-error' if is_error else 'login-success' }}">{{ message }}</div>
        {% endif %}
        <button type="submit" class="btn btn-save login-submit">Envoyer le lien</button>
      </form>
      <div style="text-align:center;margin-top:12px">
        <a href="/login" style="font-size:12px;color:var(--dimmed)">Retour &agrave; la connexion</a>
      </div>
    </div>
  </div>
</body>
</html>
