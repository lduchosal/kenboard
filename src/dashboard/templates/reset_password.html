<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kenboard &mdash; Nouveau mot de passe</title>
<link rel="icon" type="image/png" href="/static/favicon-32.png" sizes="32x32">
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="stylesheet" href="/style.css">
</head>
<body class="login-body">
  <div class="login-card login-card-split">
    <div class="login-logo-panel">
      <img src="/static/logo.svg" alt="Kenboard" class="login-logo">
    </div>
    <div class="login-form-panel">
      <h1 class="login-title">Nouveau mot de passe</h1>
      <form method="post" action="/reset-password/{{ token }}" class="login-form" autocomplete="off">
        <label class="login-label">
          Nouveau mot de passe
          <input type="password" name="password" autofocus required autocomplete="new-password">
        </label>
        <label class="login-label">
          Confirmation
          <input type="password" name="password_confirm" required autocomplete="new-password">
        </label>
        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        <button type="submit" class="btn btn-save login-submit">Changer le mot de passe</button>
      </form>
    </div>
  </div>
</body>
</html>
